name: Stage test

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test and snapshot build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2.9.1

      - name: Resolve package metadata
        id: meta
        run: |
          version=$(grep '^version' agent-nerves/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "git_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: cargo test --release -p agent-nerves -- --test-threads=1

      - name: Snapshot build
        run: cargo build --release -p agent-nerves

      - name: Stage snapshot binary
        run: |
          mkdir -p dist
          cp target/release/agent-nerves \
            "dist/agent-nerves-snapshot-linux-x86_64-${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.git_sha }}"
          chmod +x "dist/agent-nerves-snapshot-linux-x86_64-${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.git_sha }}"

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v7
        with:
          name: agent-nerves-snapshot-linux-x86_64
          path: dist/agent-nerves-snapshot-linux-x86_64-${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.git_sha }}
          if-no-files-found: error
          retention-days: 14

      - uses: aeswibon/pipeline-compose-export@v1.1.0
        if: success()
        with:
          stage_id: test
          outputs: >-
            {"version":"${{ steps.meta.outputs.version }}",
             "git_sha":"${{ steps.meta.outputs.git_sha }}",
             "snapshot_run_id":"${{ github.run_id }}"}
